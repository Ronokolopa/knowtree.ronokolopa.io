<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ronokolopa</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* TOP BLOCK */
.top {
    background: #1e3a8a;
    color: white;
    padding: 60px 20px;
    text-align: center;
    animation: fadeIn 1.2s ease;
}

.top h1 {
    margin: 0;
    font-size: 40px;
}

.top p {
    margin-top: 15px;
    font-size: 18px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
}

/* MAIN */
.main {
    background: white;
    text-align: center;
    padding: 80px 20px;
}

/* BOX */
.box {
    display: inline-block;
    background: #f3f4f6;
    padding: 30px 40px;
    border-radius: 15px;
    transition: 0.3s;
}

.box:hover {
    transform: translateY(-10px);
    box-shadow: 0 15px 30px rgba(0,0,0,0.2);
}

/* BUTTON */
.button {
    display: inline-block;
    margin-top: 15px;
    padding: 12px 25px;
    background: #1e3a8a;
    color: white;
    text-decoration: none;
    border-radius: 10px;
    transition: 0.3s;
}

/* 🔥 STARKER HOVER */
.button:hover {
    transform: scale(1.1);
    background: #2563eb;
    box-shadow: 0 0 20px #2563eb;
}

/* FOOTER */
.bottom {
    background: #1e3a8a;
    color: white;
    text-align: center;
    padding: 20px;
}

/* ANIMATION */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
</style>

</head>

<body>

<div class="top">
    <h1>Hey, I'm Ronokolopa!</h1>
    <p>
        I'm a Discord bot developer working on useful and simple systems.  
        In my free time, I enjoy playing Roblox and building new projects.
    </p>
</div>

<div class="main">
    <div class="box">
        <h2>Enkel Hans</h2>
        <p>A simple Discord bot with useful features for your server.</p>

        <a class="button" href="https://discord.com/oauth2/authorize?client_id=1442983292805714044" target="_blank">
            Bot einladen →
        </a>
    </div>
</div>

<div class="bottom">
    © 2026 @ronokolopa
</div>

</body>
</html>
